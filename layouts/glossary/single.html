{{ define "main" }}
  <article class="article article-page glossary-single">
    <header class="article-header">
      <p class="eyebrow">Glossary Entry</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}
        <p class="article-summary">{{ . }}</p>
      {{ end }}
    </header>
    <div class="prose article-prose">
      {{ .Content }}
      {{ partial "disclaimer.html" . }}
    </div>
  </article>
{{ end }}
