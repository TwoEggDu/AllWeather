{{ define "main" }}
  <article class="article">
    <header class="article-header">
      <p class="eyebrow">{{ .Date.Format "2006-01-02" }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}
        <p class="article-summary">{{ . }}</p>
      {{ end }}
      {{ with .Params.tags }}
        <div class="tag-row">
          {{ range . }}
            <span class="tag">{{ . }}</span>
          {{ end }}
        </div>
      {{ end }}
    </header>

    <div class="prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
