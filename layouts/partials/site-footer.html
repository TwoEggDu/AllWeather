<footer class="site-footer">
  <div class="footer-main">
    <div>
      <p class="eyebrow">Research Journal</p>
      <p class="footer-title">{{ site.Title }}</p>
      <p>{{ site.Params.tagline }}</p>
      <p>{{ site.Params.repoNote }}</p>
    </div>
    <div class="footer-links">
      <a href="{{ "/posts/" | relURL }}">最新文章</a>
      <a href="{{ "/topics/" | relURL }}">栏目总览</a>
      <a href="{{ "/glossary/" | relURL }}">词汇表</a>
      <a href="{{ "/disclaimer/" | relURL }}">免责声明</a>
      {{ with site.Home.OutputFormats.Get "RSS" }}
        <a href="{{ .Permalink }}">RSS</a>
      {{ end }}
    </div>
  </div>
  <div class="footer-note">
    <p>{{ site.Params.disclaimer }}</p>
    <p>&copy; {{ now.Year }} {{ site.Params.author }}</p>
  </div>
</footer>
